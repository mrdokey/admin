<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMS RIDE | Customer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Public Sans', sans-serif; background-color: #f5f5f9; padding-bottom: 90px; }
        .content-area { padding: 20px; }
        .customer-card { background: #fff; border-radius: 12px; padding: 15px; margin-bottom: 10px; border: none; box-shadow: 0 2px 6px rgba(0,0,0,0.05); display: flex; align-items: center; justify-content: space-between; }
        .cust-icon { width: 45px; height: 45px; background: rgba(105, 108, 255, 0.1); color: #696cff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; margin-right: 15px; }
        .cust-info { flex-grow: 1; }
        .btn-wa { background-color: #25D366; color: white; border-radius: 50%; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; text-decoration: none; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #e7e7ff; z-index: 1000; }
        .nav-item { text-align: center; color: #a1acb8; text-decoration: none; font-size: 0.7rem; font-weight: 600; }
        .nav-item.active { color: #696cff; }
        .nav-item i { font-size: 1.25rem; display: block; margin-bottom: 3px; }
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
    </style>
</head>
<body>
    <div id="loading-overlay"><div class="spinner-border text-primary mb-2"></div><p class="fw-bold">Memuat Data Pelanggan...</p></div>

    <div class="content-area">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="fw-bold mb-0 text-dark">Data Customer</h4>
            <button class="btn btn-sm btn-light border rounded-pill" onclick="loadCustomers()"><i class="fas fa-sync"></i></button>
        </div>
        
        <div class="input-group mb-3 shadow-sm">
            <span class="input-group-text bg-white border-0"><i class="fas fa-search text-muted"></i></span>
            <input type="text" id="searchCust" class="form-control border-0" placeholder="Cari nama atau nomor..." onkeyup="filterCustomer()">
        </div>

        <div id="customer-list">
            </div>
    </div>

    <div class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i>Home</a>
        <a href="item.html" class="nav-item"><i class="fas fa-th-list"></i>Armada</a>
        <a href="#" class="nav-item"><i class="fas fa-wallet"></i>Cashflow</a>
        <a href="customer.html" class="nav-item active"><i class="fas fa-user-friends"></i>Customer</a>
    </div>

    <script>
        const webAppUrl = "https://script.google.com/macros/s/AKfycbz2bTvtEEJq_UjNxzMBYjIExJOdvoLiamvyJj19DqN9UA-ZzYuJu6GW6qx3BCvXbI_5pA/exec";
        const userEmail = localStorage.getItem('ams_user_email');
        let masterCustomers = [];

        window.onload = function() {
            if (!userEmail) { window.location.href = "login.html"; return; }
            loadCustomers();
        };

        function loadCustomers() {
            document.getElementById('loading-overlay').style.display = 'flex';
            fetch(`${webAppUrl}?action=read_full&email=${userEmail}`)
            .then(r => r.json())
            .then(data => {
                masterCustomers = data.customers || [];
                renderCustomers(masterCustomers);
                document.getElementById('loading-overlay').style.display = 'none';
            })
            .catch(err => {
                console.error(err);
                document.getElementById('loading-overlay').style.display = 'none';
            });
        }

        function renderCustomers(data) {
            let html = "";
            if (data.length === 0) {
                html = '<div class="text-center p-5 text-muted">Belum ada data customer.</div>';
            } else {
                data.forEach(c => {
                    // Bersihkan nomor WA untuk link (hilangkan karakter selain angka)
                    const cleanWA = c.no_wa.replace(/\D/g, '');
                    html += `
                    <div class="customer-card">
                        <div class="cust-icon"><i class="fas fa-user"></i></div>
                        <div class="cust-info">
                            <div class="fw-bold text-dark">${c.nama}</div>
                            <div class="small text-muted">${c.no_wa}</div>
                            <div class="small text-muted" style="font-size: 0.7rem;"><i class="fas fa-map-marker-alt me-1"></i> ${c.alamat_antar || '-'}</div>
                        </div>
                        <a href="https://wa.me/${cleanWA}" class="btn-wa" target="_blank">
                            <i class="fab fa-whatsapp"></i>
                        </a>
                    </div>`;
                });
            }
            document.getElementById('customer-list').innerHTML = html;
        }

        function filterCustomer() {
            let q = document.getElementById('searchCust').value.toLowerCase();
            const filtered = masterCustomers.filter(c => 
                c.nama.toLowerCase().includes(q) || 
                c.no_wa.toLowerCase().includes(q)
            );
            renderCustomers(filtered);
        }
    </script>
</body>
</html>
