<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMS RIDE | Armada</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Public Sans', sans-serif; background-color: #f5f5f9; padding-bottom: 80px; }
        .content-area { padding: 20px; }
        .unit-card { background: #fff; border-radius: 12px; padding: 12px; margin-bottom: 12px; border: none; box-shadow: 0 2px 6px rgba(0,0,0,0.05); display: flex; align-items: center; }
        .unit-img { width: 80px; height: 80px; object-fit: cover; border-radius: 10px; margin-right: 15px; background: #f0f0f0; }
        .unit-info { flex-grow: 1; }
        .unit-name { font-weight: 700; color: #566a7f; margin: 0; }
        .unit-status { font-size: 0.7rem; font-weight: 700; padding: 2px 8px; border-radius: 5px; }
        .status-available { background: #e8fadf; color: #71dd37; }
        .status-rent { background: #ffe5e5; color: #ff3e1d; }
        .status-booked { background: #fff2e2; color: #fdac41; }
        
        /* Bottom Nav tetep ada */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #e7e7ff; z-index: 1000; }
        .nav-item { text-align: center; color: #a1acb8; text-decoration: none; font-size: 0.75rem; }
        .nav-item.active { color: #696cff; }
        .nav-item i { font-size: 1.2rem; display: block; }
        
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
    </style>
</head>
<body>
    <div id="loading-overlay"><div class="spinner-border text-primary"></div></div>

    <div class="content-area">
        <h4 class="fw-bold mb-4">Armada Motor</h4>
        <input type="text" id="search" class="form-control mb-3 rounded-pill border-0 shadow-sm" placeholder="Cari unit atau tipe..." onkeyup="filterUnit()">
        
        <div id="unit-list">
            </div>
    </div>

    <div class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i>Home</a>
        <a href="item.html" class="nav-item active"><i class="fas fa-motorcycle"></i>Armada</a>
        <a href="#" class="nav-item"><i class="fas fa-wallet"></i>Cashflow</a>
        <a href="#" class="nav-item"><i class="fas fa-user-friends"></i>Customer</a>
    </div>

    <script>
        const webAppUrl = "https://script.google.com/macros/s/AKfycbwdmzb73BiGP7NualXFfyZcn75MNektvXzGm-tOFL3A7eZE-kWO7E4HRMOnOdI-ElyjTg/exec";
        const userEmail = localStorage.getItem('ams_user_email');
        let masterUnits = [];

        window.onload = function() {
            if (!userEmail) window.location.href = "index.html";
            loadUnits();
        };

        function loadUnits() {
            document.getElementById('loading-overlay').style.display = 'flex';
            fetch(`${webAppUrl}?action=read_full&email=${userEmail}`)
            .then(r => r.json())
            .then(data => {
                masterUnits = data.units || [];
                renderUnits(masterUnits);
                document.getElementById('loading-overlay').style.display = 'none';
            });
        }

        function renderUnits(units) {
            let html = "";
            units.forEach(u => {
                let sClass = u.status === 'Available' ? 'status-available' : (u.status === 'Rent' ? 'status-rent' : 'status-booked');
                html += `
                <div class="unit-card">
                    <img src="${u.foto_link}" class="unit-img" onerror="this.src='https://via.placeholder.com/80'">
                    <div class="unit-info">
                        <div class="d-flex justify-content-between align-items-start">
                            <p class="unit-name">${u.no_motor}</p>
                            <span class="unit-status ${sClass}">${u.status}</span>
                        </div>
                        <small class="text-muted">${u.brand} ${u.tipe}</small><br>
                        <small class="fw-bold text-primary">Rp ${u.harga.toLocaleString('id-ID')}</small>
                    </div>
                </div>`;
            });
            document.getElementById('unit-list').innerHTML = html;
        }

        function filterUnit() {
            let q = document.getElementById('search').value.toLowerCase();
            let filtered = masterUnits.filter(u => u.no_motor.toLowerCase().includes(q) || u.tipe.toLowerCase().includes(q));
            renderUnits(filtered);
        }
    </script>
</body>
</html>
