<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMS RIDE | Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Public Sans', sans-serif; background-color: #f5f5f9; padding-bottom: 90px; }
        .content-area { padding: 20px; }
        
        /* Register Card Style */
        .reg-card { background: #fff; border-radius: 12px; padding: 15px; margin-bottom: 12px; border: none; box-shadow: 0 2px 6px rgba(0,0,0,0.05); position: relative; overflow: hidden; }
        .reg-status-strip { position: absolute; left: 0; top: 0; bottom: 0; width: 5px; }
        .status-booked { background: #fdac41; }
        .status-rent { background: #ff3e1d; }
        .status-back { background: #71dd37; }
        
        /* Badge Status */
        .badge-status { font-size: 0.65rem; padding: 4px 8px; border-radius: 4px; font-weight: 700; text-transform: uppercase; }
        
        /* Sync & UI Elements */
        #sync-status { font-size: 0.7rem; font-weight: 600; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #e7e7ff; z-index: 1000; }
        .nav-item { text-align: center; color: #a1acb8; text-decoration: none; font-size: 0.7rem; font-weight: 600; }
        .nav-item.active { color: #696cff; }
        .nav-item i { font-size: 1.25rem; display: block; margin-bottom: 3px; }
        .fab-add { position: fixed; bottom: 85px; right: 20px; width: 56px; height: 56px; border-radius: 50%; background: #696cff; color: white; border: none; box-shadow: 0 4px 12px rgba(105, 108, 255, 0.4); display: flex; align-items: center; justify-content: center; z-index: 999; }
        
        /* Form Styling */
        .form-label { font-size: 0.75rem; font-weight: 700; color: #a1acb8; margin-bottom: 4px; text-transform: uppercase; }
        .form-control, .form-select { border: none; background-color: #f5f5f9; padding: 10px 15px; border-radius: 8px; font-size: 0.9rem; }
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
    </style>
</head>
<body>
    <div id="loading-overlay"><div class="spinner-border text-primary mb-2"></div><p class="small fw-bold">Memproses Transaksi...</p></div>

    <div class="content-area">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
                <h4 class="fw-bold mb-0 text-dark">Data Register</h4>
                <div id="sync-status" class="text-muted"><i class="fas fa-check-circle text-success"></i> Ready</div>
            </div>
            <button class="btn btn-sm btn-light border rounded-pill px-3" onclick="loadRegisters(true)"><i class="fas fa-sync"></i></button>
        </div>
        
        <input type="text" id="searchReg" class="form-control mb-3 shadow-sm border-0" placeholder="Cari penyewa atau no unit..." onkeyup="filterRegister()" style="background:#fff; padding:12px;">
        
        <div id="register-list">
            </div>
    </div>

    <button class="fab-add" onclick="openRegForm()"><i class="fas fa-plus fa-lg"></i></button>

    <div class="modal fade" id="modalReg" tabindex="-1">
        <div class="modal-dialog modal-fullscreen">
            <div class="modal-content border-0">
                <div class="modal-header shadow-sm bg-white sticky-top">
                    <h5 class="fw-bold text-dark mb-0">Booking / Sewa Baru</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="formRegister">
                        <div class="row">
                            <div class="col-12 mb-3">
                                <label class="form-label">Unit Motor*</label>
                                <select class="form-select" id="r_unit" required onchange="updatePrice()"></select>
                            </div>
                            <div class="col-12 mb-3">
                                <label class="form-label">Nama Penyewa*</label>
                                <input type="text" class="form-control" id="r_nama" placeholder="Pilih atau Ketik Nama" required>
                            </div>
                            <div class="col-12 mb-3">
                                <label class="form-label">Nomor WhatsApp*</label>
                                <input type="tel" class="form-control" id="r_wa" required>
                            </div>

                            <div class="col-6 mb-3">
                                <label class="form-label">Tgl Sewa*</label>
                                <input type="date" class="form-control" id="r_tgl_sewa" required>
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label">Durasi (Hari)*</label>
                                <input type="number" class="form-control" id="r_hari" value="1" min="1" required oninput="calculateTotal()">
                            </div>
                            <div class="col-12 mb-3">
                                <label class="form-label">Total Harga</label>
                                <input type="text" class="form-control fw-bold text-primary" id="r_total_display" readonly value="Rp 0">
                                <input type="hidden" id="r_total_val">
                            </div>

                            <div class="col-12 mb-3">
                                <label class="form-label">Lokasi Antar</label>
                                <input type="text" class="form-control" id="r_antar">
                            </div>
                            <div class="col-12 mb-3">
                                <label class="form-label">Lokasi Jemput</label>
                                <input type="text" class="form-control" id="r_jemput">
                            </div>
                            
                            <div class="col-12 mt-3">
                                <button type="submit" class="btn btn-primary w-100 fw-bold py-3 rounded-pill shadow">SIMPAN REGISTER</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i>Home</a>
        <a href="item.html" class="nav-item"><i class="fas fa-th-list"></i>Armada</a>
        <a href="register.html" class="nav-item active"><i class="fas fa-calendar-check"></i>Register</a>
        <a href="customer.html" class="nav-item"><i class="fas fa-user-friends"></i>Customer</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const webAppUrl = "https://script.google.com/macros/s/AKfycbxC55Pe2xDqGfqi9mOAs_tAqwetECKp5uOHwG1grJ_rrqdIhLQ1IXG0DBzBmWhCFRYzVQ/exec";
        const userEmail = localStorage.getItem('ams_user_email');
        let masterRegisters = [];
        let unitList = [];
        let modalReg;

        window.onload = function() {
            if (!userEmail) { window.location.href = "index.html"; return; }
            modalReg = new bootstrap.Modal(document.getElementById('modalReg'));
            
            // Load cache untuk kecepatan
            const cached = localStorage.getItem('ams_last_registers');
            if (cached) { masterRegisters = JSON.parse(cached); renderRegisters(masterRegisters); }
            
            loadRegisters();
            loadUnitSelection(); // Ambil data unit dari item.html logic
        };

        function loadRegisters() {
            const statusLabel = document.getElementById('sync-status');
            statusLabel.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Syncing...`;
            
            fetch(`${webAppUrl}?action=read_full&email=${userEmail}`)
            .then(r => r.json())
            .then(data => {
                masterRegisters = data.registers || [];
                localStorage.setItem('ams_last_registers', JSON.stringify(masterRegisters));
                renderRegisters(masterRegisters);
                statusLabel.innerHTML = `<i class="fas fa-check-circle text-success"></i> Ready`;
            });
        }

        function loadUnitSelection() {
            // Ambil dari cache armada yang tersedia
            const cachedUnits = JSON.parse(localStorage.getItem('ams_last_units') || "[]");
            unitList = cachedUnits;
            let html = '<option value="">-- Pilih Unit --</option>';
            cachedUnits.forEach(u => {
                if(u.status === 'Available') {
                    html += `<option value="${u.no_motor}" data-price="${u.harga}">${u.no_motor} - ${u.tipe}</option>`;
                }
            });
            document.getElementById('r_unit').innerHTML = html;
        }

        function renderRegisters(data) {
            let html = "";
            data.forEach(r => {
                let sClass = r.status === 'Booked' ? 'status-booked' : (r.status === 'Rent' ? 'status-rent' : 'status-back');
                html += `
                <div class="reg-card">
                    <div class="reg-status-strip ${sClass}"></div>
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <div>
                            <span class="badge badge-status ${sClass}">${r.status}</span>
                            <small class="text-muted ms-2">${r.no_register}</small>
                        </div>
                        <div class="fw-bold text-primary">Rp ${parseInt(r.total || 0).toLocaleString('id-ID')}</div>
                    </div>
                    <div class="fw-bold text-dark" style="font-size: 1rem;">${r.nama}</div>
                    <div class="text-muted small"><i class="fas fa-motorcycle me-1"></i> ${r.no_motor} | <i class="fas fa-calendar-alt me-1"></i> ${r.tgl_sewa}</div>
                    <div class="mt-2 pt-2 border-top d-flex justify-content-between">
                        <small class="text-muted"><i class="fas fa-map-marker-alt text-danger"></i> ${r.alamat_antar || 'No Info'}</small>
                        <a href="https://wa.me/${r.no_wa}" class="text-success text-decoration-none fw-bold small"><i class="fab fa-whatsapp"></i> Chat</a>
                    </div>
                </div>`;
            });
            document.getElementById('register-list').innerHTML = html || '<p class="text-center mt-5">Belum ada transaksi.</p>';
        }

        // Logic Perhitungan
        function calculateTotal() {
            const select = document.getElementById('r_unit');
            const price = select.options[select.selectedIndex]?.getAttribute('data-price') || 0;
            const days = document.getElementById('r_hari').value || 0;
            const total = price * days;
            document.getElementById('r_total_display').value = "Rp " + total.toLocaleString('id-ID');
            document.getElementById('r_total_val').value = total;
        }

        function updatePrice() { calculateTotal(); }

        function openRegForm() {
            document.getElementById('formRegister').reset();
            document.getElementById('r_tgl_sewa').valueAsDate = new Date();
            loadUnitSelection();
            modalReg.show();
        }

        document.getElementById('formRegister').onsubmit = function(e) {
            e.preventDefault();
            document.getElementById('loading-overlay').style.display = 'flex';
            
            const payload = {
                action: "insert_register",
                email: userEmail,
                no_motor: document.getElementById('r_unit').value,
                nama: document.getElementById('r_nama').value,
                wa: document.getElementById('r_wa').value,
                tgl_sewa: document.getElementById('r_tgl_sewa').value,
                hari: document.getElementById('r_hari').value,
                total: document.getElementById('r_total_val').value,
                antar: document.getElementById('r_antar').value,
                jemput: document.getElementById('r_jemput').value
            };

            fetch(webAppUrl, { method: "POST", body: JSON.stringify(payload) })
            .then(r => r.json())
            .then(() => {
                modalReg.hide();
                loadRegisters();
                document.getElementById('loading-overlay').style.display = 'none';
            });
        };

        function filterRegister() {
            let q = document.getElementById('searchReg').value.toLowerCase();
            renderRegisters(masterRegisters.filter(r => 
                (r.nama && r.nama.toLowerCase().includes(q)) || 
                (r.no_motor && r.no_motor.toLowerCase().includes(q))
            ));
        }
    </script>
</body>
</html>
