<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMS RIDE | Armada</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Public Sans', sans-serif; background-color: #f5f5f9; padding-bottom: 90px; }
        .content-area { padding: 20px; }
        .unit-card { background: #fff; border-radius: 12px; padding: 12px; margin-bottom: 10px; border: none; box-shadow: 0 2px 6px rgba(0,0,0,0.05); display: flex; align-items: center; cursor: pointer; }
        .unit-img { width: 70px; height: 70px; object-fit: cover; border-radius: 10px; margin-right: 15px; background: #f0f0f0; }
        .unit-info { flex-grow: 1; }
        .group-header { border-left: 4px solid #696cff; background: rgba(105, 108, 255, 0.05); padding: 8px 12px; margin-top: 20px; margin-bottom: 10px; border-radius: 0 8px 8px 0; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #e7e7ff; z-index: 1000; }
        .nav-item { text-align: center; color: #a1acb8; text-decoration: none; font-size: 0.7rem; font-weight: 600; }
        .nav-item.active { color: #696cff; }
        .nav-item i { font-size: 1.25rem; display: block; margin-bottom: 3px; }
        .fab-add { position: fixed; bottom: 85px; right: 20px; width: 56px; height: 56px; border-radius: 50%; background: #696cff; color: white; border: none; box-shadow: 0 4px 12px rgba(105, 108, 255, 0.4); display:flex; align-items:center; justify-content:center; z-index: 999; }
        
        #flash-launcher { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.6s ease-in-out; }
        .launcher-img { width: 100px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>
    <div id="flash-launcher">
        <img src="https://i.ibb.co.com/9kd49x7S/1775451864442.png" class="launcher-img">
        <p class="text-muted small mt-3 fw-bold">Loading Armada...</p>
    </div>

    <div class="content-area">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="fw-bold mb-0">Daftar Armada</h4>
            <button class="btn btn-sm btn-light border rounded-pill" onclick="syncData()"><i class="fas fa-sync"></i></button>
        </div>
        <input type="text" id="search" class="form-control mb-3 shadow-sm border-0" placeholder="Cari unit..." onkeyup="filterUnit()" style="background:#fff; padding:12px;">
        <div id="unit-list"></div>
    </div>

    <button class="fab-add" onclick="openForm(null)"><i class="fas fa-plus fa-lg"></i></button>

    <div class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i>Home</a>
        <a href="item.html" class="nav-item active"><i class="fas fa-th-list"></i>Armada</a>
        <a href="#" class="nav-item"><i class="fas fa-wallet"></i>Cashflow</a>
        <a href="#" class="nav-item"><i class="fas fa-user-friends"></i>Customer</a>
    </div>

    <script>
        const webAppUrl = "https://script.google.com/macros/s/AKfycbz2bTvtEEJq_UjNxzMBYjIExJOdvoLiamvyJj19DqN9UA-ZzYuJu6GW6qx3BCvXbI_5pA/exec";
        const userEmail = localStorage.getItem('ams_user_email');
        let masterUnits = [];

        window.onload = function() {
            const cached = localStorage.getItem('ams_full_cache');
            if(cached) {
                const data = JSON.parse(cached);
                masterUnits = data.units || [];
                renderUnits(masterUnits);
                // Sembunyikan launcher karena data cache sudah tampil
                setTimeout(() => { document.getElementById('flash-launcher').style.opacity = '0'; setTimeout(() => document.getElementById('flash-launcher').style.display='none', 600); }, 500);
            } else {
                syncData();
            }
        };

        function syncData() {
            document.getElementById('flash-launcher').style.display = 'flex';
            document.getElementById('flash-launcher').style.opacity = '1';
            fetch(`${webAppUrl}?action=read_full&email=${userEmail}`)
            .then(r => r.json())
            .then(data => {
                localStorage.setItem('ams_full_cache', JSON.stringify(data));
                masterUnits = data.units || [];
                renderUnits(masterUnits);
                setTimeout(() => { document.getElementById('flash-launcher').style.opacity = '0'; setTimeout(() => document.getElementById('flash-launcher').style.display='none', 600); }, 800);
            });
        }

        function renderUnits(units) {
            const groups = { 'Rent': units.filter(u => u.status === 'Rent'), 'Booked': units.filter(u => u.status === 'Booked'), 'Available': units.filter(u => u.status === 'Available') };
            let html = "";
            for (const [status, data] of Object.entries(groups)) {
                if (data.length > 0) {
                    html += `<div class="group-header"><span class="fw-bold small text-uppercase">${status}</span></div>`;
                    data.forEach(u => {
                        html += `<div class="unit-card" onclick="openForm('${u.no_motor}')">
                            <img src="${u.foto_link}" class="unit-img" onerror="this.src='https://via.placeholder.com/80'">
                            <div class="unit-info">
                                <div class="d-flex justify-content-between"><b>${u.no_motor}</b><span class="text-primary fw-bold">Rp ${u.harga.toLocaleString('id-ID')}</span></div>
                                <small class="text-muted">${u.brand} ${u.tipe}</small>
                            </div>
                        </div>`;
                    });
                }
            }
            document.getElementById('unit-list').innerHTML = html;
        }

        function filterUnit() {
            let q = document.getElementById('search').value.toLowerCase();
            renderUnits(masterUnits.filter(u => u.no_motor.toLowerCase().includes(q) || u.tipe.toLowerCase().includes(q)));
        }
    </script>
</body>
</html>
