<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMS RIDE | Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Public Sans', sans-serif; background-color: #f5f5f9; color: #697a8d; padding-bottom: 80px; overflow-x: hidden; }
        .content-area { padding: 20px; }
        .card { border: none; border-radius: 0.5rem; box-shadow: 0 2px 6px 0 rgba(67, 89, 113, 0.12); margin-bottom: 20px; background: #fff; }
        .stat-value { font-size: 1.5rem; font-weight: 700; color: #566a7f; }
        .btn-primary { background-color: #696cff; border-color: #696cff; box-shadow: 0 0.125rem 0.25rem 0 rgba(105, 108, 255, 0.4); }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #e7e7ff; z-index: 1000; }
        .nav-item { text-align: center; color: #a1acb8; text-decoration: none; font-size: 0.7rem; font-weight: 600; }
        .nav-item.active { color: #696cff; }
        .nav-item i { font-size: 1.25rem; display: block; margin-bottom: 3px; }
        
        /* Flash Launcher Animation */
        #flash-launcher { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.6s ease-in-out; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.8; } 100% { transform: scale(1); opacity: 1; } }
        .launcher-img { width: 120px; animation: pulse 1.5s infinite; }
    </style>
</head>
<body>
    <div id="flash-launcher">
        <img src="https://i.ibb.co.com/9kd49x7S/1775451864442.png" class="launcher-img">
        <h3 class="fw-bold mt-3">AMS <span style="color:#696cff">RIDE</span></h3>
        <div class="spinner-grow text-primary mt-2" style="width: 1rem; height: 1rem;"></div>
        <p class="text-muted small mt-2">Syncing MRD Digital Solution...</p>
    </div>

    <div id="dashboard-content" style="display:none;">
        <div class="content-area">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold mb-0">Dashboard</h4>
                <button class="btn btn-sm btn-outline-primary rounded-pill px-3" onclick="loadData(true)"><i class="fas fa-sync me-1"></i> Sync</button>
            </div>

            <div class="row g-3 mb-2">
                <div class="col-6"><div class="card p-3 text-center"><small class="text-muted">EST. INCOME</small><div class="stat-value text-primary mt-1" id="stat-income">Rp 0</div></div></div>
                <div class="col-6"><div class="card p-3 text-center"><small class="text-muted">READY</small><div class="stat-value mt-1" id="stat-units">0</div></div></div>
            </div>

            <button class="btn btn-primary shadow w-100 py-3 mb-4 fw-bold rounded-3" data-bs-toggle="modal" data-bs-target="#modalInput">
                <i class="fas fa-plus-circle me-2"></i> REGISTER RENTAL
            </button>

            <div class="card">
                <div class="card-header bg-transparent border-0"><h5 class="mb-0 fw-bold">Recent History</h5></div>
                <div class="table-responsive"><table class="table table-hover mb-0"><tbody id="table-body"></tbody></table></div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="index.html" class="nav-item active"><i class="fas fa-home"></i>Home</a>
        <a href="item.html" class="nav-item"><i class="fas fa-th-list"></i>Armada</a>
        <a href="#" class="nav-item"><i class="fas fa-wallet"></i>Cashflow</a>
        <a href="#" class="nav-item"><i class="fas fa-user-friends"></i>Customer</a>
    </div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const webAppUrl = "https://script.google.com/macros/s/AKfycbz2bTvtEEJq_UjNxzMBYjIExJOdvoLiamvyJj19DqN9UA-ZzYuJu6GW6qx3BCvXbI_5pA/exec";
        let userEmail = localStorage.getItem('ams_user_email');

        window.onload = function () {
            if (userEmail) { 
                showDashboard();
                renderFromCache();
                loadData(); 
            } else { 
                window.location.href = "login.html"; // Asumsi ada login terpisah atau pakai div login
            }
        };

        function renderFromCache() {
            const cached = localStorage.getItem('ams_full_cache');
            if (cached) updateUI(JSON.parse(cached));
        }

        function loadData(manual = false) {
            const launcher = document.getElementById('flash-launcher');
            if(manual) { launcher.style.display = 'flex'; launcher.style.opacity = '1'; }

            fetch(`${webAppUrl}?action=read_full&email=${userEmail}`)
            .then(r => r.json())
            .then(data => {
                localStorage.setItem('ams_full_cache', JSON.stringify(data));
                updateUI(data);
                setTimeout(() => { launcher.style.opacity = '0'; setTimeout(() => launcher.style.display = 'none', 600); }, 800);
            });
        }

        function updateUI(data) {
            document.getElementById('stat-income').innerText = "Rp " + (data.income || 0);
            document.getElementById('stat-units').innerText = data.unitsReady || 0;
            let h = "";
            if(data.records) data.records.forEach(r => { 
                h += `<tr><td class="small px-3 py-2 border-0"><b>${r.tgl}</b><br>${r.nama}</td><td class="text-end small px-3 py-2 border-0"><b>${r.unit}</b><br><span class="text-primary fw-bold">Rp ${r.total}</span></td></tr>`; 
            });
            document.getElementById('table-body').innerHTML = h;
        }

        function showDashboard() { document.getElementById('dashboard-content').style.display = 'block'; }
    </script>
</body>
</html>
